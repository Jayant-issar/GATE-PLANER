services:
  mongo:
    image: mongo:7
    container_name: gate-planner-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: gate_user
      MONGO_INITDB_ROOT_PASSWORD: gate_password
      MONGO_INITDB_DATABASE: gate_planner
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
